              - label:
                  text: "Wasmachine"
                  align: TOP_LEFT
                  x: 8
                  y: 6
                  text_color: ${col_label}
                  text_font: montserrat_14
              - label:
                  id: washer_label
                  text: "-- W"
                  align: TOP_LEFT
                  x: 8
                  y: 34
                  text_color: 0xFFFFFF
                  text_font: montserrat_24

        # --- Droogkast card (right) — caption+value TOP_LEFT to clear the
