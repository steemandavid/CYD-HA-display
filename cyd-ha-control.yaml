        # --- AIRCO card (3 mode readouts) --------------------------------
        - obj:
            align: TOP_LEFT
            x: 6
            y: 76
            width: 308
            height: 160
            bg_color: ${col_card}
            bg_opa: COVER
            radius: 8
            border_width: 0
            pad_all: 0
            widgets:
              - label:
                  text: "AIRCO"
                  align: TOP_LEFT
                  x: 10
                  y: 8
                  text_color: ${col_label}
                  text_font: montserrat_14
              - label:
                  text: "Woonkamer"
                  align: TOP_LEFT
                  x: 14
                  y: 44
                  text_color: ${col_label}
                  text_font: montserrat_14
              - label:
                  id: ac_woonkamer_label
                  text: "--"
                  align: TOP_LEFT
                  x: 200
                  y: 36
                  text_color: ${col_label}
                  text_font: montserrat_24
              - label:
                  text: "Overloop"
                  align: TOP_LEFT
                  x: 14
                  y: 82
                  text_color: ${col_label}
                  text_font: montserrat_14
              - label:
                  id: ac_overloop_label
                  text: "--"
                  align: TOP_LEFT
                  x: 200
                  y: 74
                  text_color: ${col_label}
                  text_font: montserrat_24
              - label:
                  text: "Slaapkamer"
                  align: TOP_LEFT
                  x: 14
                  y: 120
                  text_color: ${col_label}
                  text_font: montserrat_14
              - label:
                  id: ac_slaapkamer_label
                  text: "--"
                  align: TOP_LEFT
                  x: 200
                  y: 112
                  text_color: ${col_label}
                  text_font: montserrat_24
              # --- AC mode tap-targets: transparent overlay buttons sitting over
              #     each status readout. A tap cycles cool -> heat -> off -> cool
              #     and calls climate.set_hvac_mode. entity_id stays a !secret
              #     (never inside a lambda); the next mode is picked by branching
              #     on the text_sensor's current state. The label beneath is
              #     untouched and keeps reflecting the confirmed climate state.
              - button:
                  id: ac_woonkamer_btn
                  align: TOP_LEFT
                  x: 200
                  y: 32
                  width: 108
                  height: 36
                  bg_opa: TRANSP
                  border_width: 0
                  on_short_click:
                    - logger.log: "AC Woonkamer tap -> cycle cool/heat/off"
                    - if:
                        condition:
                          lambda: return id(climate_woonkamer).state == "cool";
                        then:
                          - homeassistant.action:
                              action: climate.set_hvac_mode
                              data:
                                entity_id: !secret climate_woonkamer_entity
                                hvac_mode: "heat"
                        else:
                          - if:
                              condition:
                                lambda: return id(climate_woonkamer).state == "heat";
                              then:
                                - homeassistant.action:
                                    action: climate.set_hvac_mode
                                    data:
                                      entity_id: !secret climate_woonkamer_entity
                                      hvac_mode: "off"
                              else:
                                - homeassistant.action:
                                    action: climate.set_hvac_mode
                                    data:
                                      entity_id: !secret climate_woonkamer_entity
                                      hvac_mode: "cool"
                    - script.execute: play_tap
              - button:
                  id: ac_overloop_btn
                  align: TOP_LEFT
                  x: 200
                  y: 70
                  width: 108
                  height: 36
                  bg_opa: TRANSP
                  border_width: 0
                  on_short_click:
                    - logger.log: "AC Overloop tap -> cycle cool/heat/off"
                    - if:
                        condition:
                          lambda: return id(climate_overloop).state == "cool";
                        then:
                          - homeassistant.action:
                              action: climate.set_hvac_mode
                              data:
                                entity_id: !secret climate_overloop_entity
                                hvac_mode: "heat"
                        else:
                          - if:
                              condition:
                                lambda: return id(climate_overloop).state == "heat";
                              then:
                                - homeassistant.action:
                                    action: climate.set_hvac_mode
                                    data:
                                      entity_id: !secret climate_overloop_entity
                                      hvac_mode: "off"
                              else:
                                - homeassistant.action:
                                    action: climate.set_hvac_mode
                                    data:
                                      entity_id: !secret climate_overloop_entity
                                      hvac_mode: "cool"
                    - script.execute: play_tap
              - button:
                  id: ac_slaapkamer_btn
                  align: TOP_LEFT
                  x: 200
                  y: 108
                  width: 108
                  height: 36
                  bg_opa: TRANSP
                  border_width: 0
                  on_short_click:
                    - logger.log: "AC Slaapkamer tap -> cycle cool/heat/off"
                    - if:
                        condition:
                          lambda: return id(climate_slaapkamer).state == "cool";
                        then:
                          - homeassistant.action:
                              action: climate.set_hvac_mode
                              data:
                                entity_id: !secret climate_slaapkamer_entity
                                hvac_mode: "heat"
                        else:
                          - if:
                              condition:
                                lambda: return id(climate_slaapkamer).state == "heat";
                              then:
                                - homeassistant.action:
                                    action: climate.set_hvac_mode
                                    data:
                                      entity_id: !secret climate_slaapkamer_entity
                                      hvac_mode: "off"
                              else:
                                - homeassistant.action:
                                    action: climate.set_hvac_mode
                                    data:
                                      entity_id: !secret climate_slaapkamer_entity
                                      hvac_mode: "cool"
                    - script.execute: play_tap

