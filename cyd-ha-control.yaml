# =============================================================================
# CYD (ESP32-2432S028) — Home Assistant control display
# Shows a power sensor large; three toggle buttons; beep > 3000 W.
# All site-specific values (Wi-Fi, API key, HA entity IDs) live in secrets.yaml.
# Board: Cheap Yellow Display, ILI9341 + XPT2046 resistive touch, GPIO26 amp.
# =============================================================================

substitutions:
  name: cyd-control
  friendly_name: "CYD Control Display"
  color_threshold: "200"         # watts — power value green below, blue at/above (red tracks buzzer_threshold)
  buzzer_threshold: "3000"       # watts — alarm beeps above this
  # --- Colour constants are written BGR (red/blue byte-swapped): the ILI9342 panel's
  #     MADCTL BGR bit swaps R/B, so values are pre-swapped to compensate.
  #     (`color_order:` has no effect on the LVGL path; swap the 1st/3rd byte to
  #     read the true intended colour.)
  col_bg: "0x181410"        # -> true 0x101418  dark screen background
  col_card: "0x28201A"      # -> true 0x1A2028  panel behind power readout
  col_label: "0xC5BEB0"     # -> true 0xB0BEC5  "Verbruik" subheader (blue-grey)
  col_low: "0x14FF39"       # -> true 0x39FF14  green  (power < 200 W)
  col_mid: "0xF4A903"       # -> true 0x03A9F4  HA blue (power 200-3000 W + buttons)
  col_high: "0x4417FF"      # -> true 0xFF1744  red    (power >= 3000 W)
  col_btn_bot: "0xD18802"   # -> true 0x0288D1  button gradient bottom
  col_claude: "0x5777D9"   # -> true 0xD97757  Claude clay (AI usage cells)
  col_zai: "0xEC631F"      # -> true 0x1F63EC  z.ai blue  (AI usage cells)

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

# ---- Connectivity ----------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap: {}                         # fallback hotspot if wifi fails

logger:

api:
  encryption:
    key: !secret api_encryption_key   # `esphome` will offer to generate one

ota:
  - platform: esphome

# ---- SPI buses -------------------------------------------------------------
# Two SEPARATE buses: one for the display, one for the XPT2046 touch.
spi:
  - id: spi_display
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12
  - id: spi_touch
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

# ---- Outputs ---------------------------------------------------------------
output:
  # Display backlight
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm
  # Onboard speaker/amp is on GPIO26. Use LEDC PWM (not DAC) — rtttl requires it.
  - platform: ledc
    pin: GPIO26
    id: speaker_pwm

light:
  - platform: monochromatic
    output: backlight_pwm
    id: backlight
    name: "Backlight"
    restore_mode: ALWAYS_ON

# ---- Speaker / beep --------------------------------------------------------
rtttl:
  id: buzzer
  output: speaker_pwm
  gain: 10%          # GPIO26 amp is loud; tune to taste

# ---- Display ---------------------------------------------------------------
display:
  - platform: ili9xxx
    id: cyd_display
    model: ILI9342
    spi_id: spi_display
    cs_pin: GPIO15
    dc_pin: GPIO2
    invert_colors: false
    auto_clear_enabled: false
    update_interval: never       # LVGL owns the screen

# ---- Touchscreen -----------------------------------------------------------
touchscreen:
  - platform: xpt2046
    id: cyd_touch
    spi_id: spi_touch
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    update_interval: 50ms
    threshold: 400
    # Typical calibration for this board. Adjust if taps are off.
    calibration:
      x_min: 280
      x_max: 3860
      y_min: 340
      y_max: 3860
    # Hardware-level fixes for the CYD PCB (XPT2046 axes are physically swapped
    # vs the ILI9341). mirror_x added to fix left/right being flipped — only
    # surfaced once buttons were placed side by side (X axis started to matter).
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: true

# ---- Power value imported from Home Assistant ------------------------------
sensor:
  - platform: homeassistant
    id: power_combined
    entity_id: !secret power_entity
    on_value:
      - lvgl.label.update:
          id: power_label
          text: !lambda |-
            char buf[16];
            snprintf(buf, sizeof(buf), "%.0f W", x * 1000.0f);
            return std::string(buf);
      # Three-tier colour: green < 200 W, blue 200-3000 W, red at/above 3000 W (= alarm).
      - lvgl.label.update:
          id: power_label
          text_color: !lambda |-
            float watts = x * 1000.0f;
            if (watts < ${color_threshold})
              return lv_color_hex(${col_low});   // green - low
            else if (watts < ${buzzer_threshold})
              return lv_color_hex(${col_mid});   // blue - normal
            else
              return lv_color_hex(${col_high});   // red - high (alarm)

  # --- AI usage cells (imported from HA; reset cells are HA templates) ---
  # Claude 5h % and z.ai 5h % — show "<n>%"; reset cells show "HuMM" countdown.
  - platform: homeassistant
    id: claude_5h
    entity_id: !secret claude_5h_entity
    on_value:
      - lvgl.label.update:
          id: claude_5h_label
          text: !lambda |-
            if (isnan(x)) return std::string("--");
            char buf[10];
            snprintf(buf, sizeof(buf), "%.0f%%", x);
            return std::string(buf);

  - platform: homeassistant
    id: claude_reset
    entity_id: !secret claude_reset_entity
    on_value:
      - lvgl.label.update:
          id: claude_reset_label
          text: !lambda |-
            if (isnan(x)) return std::string("--");
            int mins = (int) x;
            if (mins < 0) mins = 0;
            char buf[12];
            snprintf(buf, sizeof(buf), "%du%02d", mins / 60, mins % 60);
            return std::string(buf);

  - platform: homeassistant
    id: zai_5h
    entity_id: !secret zai_5h_entity
    on_value:
      - lvgl.label.update:
          id: zai_5h_label
          text: !lambda |-
            if (isnan(x)) return std::string("--");
            char buf[10];
            snprintf(buf, sizeof(buf), "%.0f%%", x);
            return std::string(buf);

  - platform: homeassistant
    id: zai_reset
    entity_id: !secret zai_reset_entity
    on_value:
      - lvgl.label.update:
          id: zai_reset_label
          text: !lambda |-
            if (isnan(x)) return std::string("--");
            int mins = (int) x;
            if (mins < 0) mins = 0;
            char buf[12];
            snprintf(buf, sizeof(buf), "%du%02d", mins / 60, mins % 60);
            return std::string(buf);

# ---- Over-threshold detection (5 s debounce) -------------------------------
binary_sensor:
  - platform: template
    id: power_high
    name: "Power above threshold"
    lambda: |-
      if (!id(power_combined).has_state()) return false;
      return id(power_combined).state * 1000.0f > ${buzzer_threshold};
    # Must stay above for 5 s before the alarm arms.
    filters:
      - delayed_on: 5s
    on_press:
      - script.execute: beep_loop
    on_release:
      - script.stop: beep_loop

# ---- Beep loop: short beep every few seconds while armed --------------------
script:
  - id: beep_loop
    mode: restart
    then:
      - while:
          condition:
            binary_sensor.is_on: power_high
          then:
            - rtttl.play: "beep:d=4,o=5,b=100:16e6"
            - delay: 3s

# ---- Helper: momentary pulse on a switch -----------------------------------
# Used by the three buttons. Calls turn_on, waits, then turn_off.
# (Implemented inline per-button below for clarity.)

# ---- LVGL UI ---------------------------------------------------------------
lvgl:
  displays:
    - cyd_display
  rotation: 0
  buffer_size: 25%
  touchscreens:
    - touchscreen_id: cyd_touch
  theme:
    button:
      bg_color: ${col_mid}
      bg_grad_color: ${col_btn_bot}
      bg_grad_dir: VER
      radius: 8
      text_color: 0xFFFFFF
  pages:
    - id: main_page
      bg_color: ${col_bg}
      widgets:
        # --- Big power readout (value only; "Verbruik" label dropped) ----
        - obj:
            align: TOP_MID
            y: 4
            width: 300
            height: 64
            bg_color: ${col_card}
            bg_opa: COVER
            radius: 8
            border_width: 0
            pad_all: 0
            widgets:
              - label:
                  id: power_label
                  text: "-- W"
                  align: CENTER
                  text_color: 0xFFFFFF
                  text_font: montserrat_48

        # --- AI usage row ------------------------------------------------
        # Four display-only cells (NOT buttons): cc 5h% | cc reset | z.ai 5h%
        # | z.ai reset. Each provider gets a 5h-% cell + a reset-countdown
        # cell. Claude cells = clay (#D97757), z.ai cells = blue (#1F63EC);
        # the caption also names the provider. Reset cells are HA template
        # sensors computing minutes-to-reset (ESPHome can't read the ISO
        # timestamp entities as numbers). 4 x 74 wide, 6px side margins,
        # 4px gaps; y 70, height 58.

        # --- Cell: Claude 5h % -------------------------------------------
        - obj:
            align: TOP_LEFT
            x: 6
            y: 70
            width: 74
            height: 58
            bg_color: ${col_claude}
            bg_opa: COVER
            radius: 8
            border_width: 0
            pad_all: 0
            widgets:
              - label:
                  id: claude_5h_label
                  text: "--%"
                  align: TOP_MID
                  y: 6
                  text_color: 0xFFFFFF
                  text_font: montserrat_24
              - label:
                  text: "cc 5h"
                  align: BOTTOM_MID
                  y: -6
                  width: 72
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: montserrat_14

        # --- Cell: Claude reset ------------------------------------------
        - obj:
            align: TOP_LEFT
            x: 84
            y: 70
            width: 74
            height: 58
            bg_color: ${col_claude}
            bg_opa: COVER
            radius: 8
            border_width: 0
            pad_all: 0
            widgets:
              - label:
                  id: claude_reset_label
                  text: "--"
                  align: TOP_MID
                  y: 6
                  text_color: 0xFFFFFF
                  text_font: montserrat_24
              - label:
                  text: "cc reset"
                  align: BOTTOM_MID
                  y: -6
                  width: 72
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: montserrat_14

        # --- Cell: z.ai 5h % ---------------------------------------------
        - obj:
            align: TOP_LEFT
            x: 162
            y: 70
            width: 74
            height: 58
            bg_color: ${col_zai}
            bg_opa: COVER
            radius: 8
            border_width: 0
            pad_all: 0
            widgets:
              - label:
                  id: zai_5h_label
                  text: "--%"
                  align: TOP_MID
                  y: 6
                  text_color: 0xFFFFFF
                  text_font: montserrat_24
              - label:
                  text: "z.ai 5h"
                  align: BOTTOM_MID
                  y: -6
                  width: 72
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: montserrat_14

        # --- Cell: z.ai reset --------------------------------------------
        - obj:
            align: TOP_LEFT
            x: 240
            y: 70
            width: 74
            height: 58
            bg_color: ${col_zai}
            bg_opa: COVER
            radius: 8
            border_width: 0
            pad_all: 0
            widgets:
              - label:
                  id: zai_reset_label
                  text: "--"
                  align: TOP_MID
                  y: 6
                  text_color: 0xFFFFFF
                  text_font: montserrat_24
              - label:
                  text: "z.ai reset"
                  align: BOTTOM_MID
                  y: -6
                  width: 72
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: montserrat_14

        # --- Three tall buttons side by side -----------------------------
        # Lower area (y 130..236). Each ~100 wide x 106 tall; 6px side margins,
        # 4px gaps. Labels wrap to fit the narrower width.

        # --- Button: garage open -----------------------------------------
        - button:
            align: TOP_LEFT
            x: 6
            y: 130
            width: 100
            height: 106
            widgets:
              - label:
                  text: "Garage OPENEN"
                  align: CENTER
                  width: 90
                  text_align: CENTER
            on_short_click:
              - logger.log: "Button: Garage OPENEN -> toggle garage_open_switch"
              - homeassistant.action:
                  action: switch.toggle
                  data:
                    entity_id: !secret garage_open_switch

        # --- Button: garage close ----------------------------------------
        - button:
            align: TOP_LEFT
            x: 110
            y: 130
            width: 100
            height: 106
            widgets:
              - label:
                  text: "Garage SLUITEN"
                  align: CENTER
                  width: 90
                  text_align: CENTER
            on_short_click:
              - logger.log: "Button: Garage SLUITEN -> toggle garage_close_switch"
              - homeassistant.action:
                  action: switch.toggle
                  data:
                    entity_id: !secret garage_close_switch

        # --- Button: door lock -------------------------------------------
        - button:
            align: TOP_LEFT
            x: 214
            y: 130
            width: 100
            height: 106
            widgets:
              - label:
                  text: "Deurslot WACHT KAMER"
                  align: CENTER
                  width: 90
                  text_align: CENTER
            on_short_click:
              - logger.log: "Button: Deurslot WACHT KAMER -> toggle doorlock_switch"
              - homeassistant.action:
                  action: switch.toggle
                  data:
                    entity_id: !secret doorlock_switch
